version = "1.0"

[metadata]
slug = "collinear-candidate/meridian-ledger-recon"
author_name = "Kushagra Gupta"
author_email = "iamkushagragupta@gmail.com"
created = "2026-06-10"
difficulty = "hard"
category = "debugging"
tags = [
    "finance",
    "event-sourcing",
    "data-forensics",
    "sqlite",
    "spec-compliance",
    "long-horizon",
]
# Network policy: NONE required. The image is stdlib-only Python; no packages
# are installed at build time beyond the pinned base image, and neither the
# agent nor the verifier needs network access. Safe to run fully offline /
# network-disabled.
network = "none"
expert_time_estimate_min = 60
junior_time_estimate_min = 180

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 900.0

[environment]
build_timeout_sec = 1200.0
# Modest resources are plenty: the log is ~2.6k events, SQLite is file-based.
cpus = 1
memory_mb = 2048
storage_mb = 1024
